<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- Owl icon -->
  <g transform="translate(4, 4)">
    <!-- Body -->
    <ellipse cx="28" cy="34" rx="14" ry="17" fill="#304035"/>
    <!-- Head -->
    <ellipse cx="28" cy="17" rx="13" ry="13" fill="#304035"/>
    <!-- Ear tufts -->
    <polygon points="17,7 14,0 20,5" fill="#304035"/>
    <polygon points="39,7 42,0 36,5" fill="#304035"/>
    <!-- Face disc -->
    <ellipse cx="28" cy="17" rx="10" ry="9" fill="#3d5244"/>
    <!-- Left eye -->
    <circle cx="22" cy="16" r="5" fill="#f5eee8"/>
    <circle cx="22" cy="16" r="3.5" fill="#a67749"/>
    <circle cx="22" cy="16" r="2" fill="#1a2920"/>
    <circle cx="23.2" cy="14.8" r="0.8" fill="white"/>
    <!-- Right eye -->
    <circle cx="34" cy="16" r="5" fill="#f5eee8"/>
    <circle cx="34" cy="16" r="3.5" fill="#a67749"/>
    <circle cx="34" cy="16" r="2" fill="#1a2920"/>
    <circle cx="35.2" cy="14.8" r="0.8" fill="white"/>
    <!-- Beak -->
    <polygon points="28,20 25,24 31,24" fill="#a67749"/>
    <!-- Belly texture -->
    <ellipse cx="28" cy="35" rx="9" ry="11" fill="#3d5244" opacity="0.6"/>
    <!-- Wing left -->
    <path d="M14 28 Q8 35 10 46 Q16 42 20 38 Z" fill="#253329"/>
    <!-- Wing right -->
    <path d="M42 28 Q48 35 46 46 Q40 42 36 38 Z" fill="#253329"/>
    <!-- Talons left -->
    <path d="M22 50 Q19 53 17 56" stroke="#a67749" stroke-width="2" stroke-linecap="round"/>
    <path d="M22 50 Q20 54 20 57" stroke="#a67749" stroke-width="2" stroke-linecap="round"/>
    <path d="M22 50 Q24 54 23 57" stroke="#a67749" stroke-width="2" stroke-linecap="round"/>
    <!-- Talons right -->
    <path d="M34 50 Q31 54 33 57" stroke="#a67749" stroke-width="2" stroke-linecap="round"/>
    <path d="M34 50 Q34 54 36 57" stroke="#a67749" stroke-width="2" stroke-linecap="round"/>
    <path d="M34 50 Q37 53 39 56" stroke="#a67749" stroke-width="2" stroke-linecap="round"/>
    <!-- Copper accent ring around eyes -->
    <circle cx="22" cy="16" r="5" stroke="#a67749" stroke-width="0.8" fill="none" opacity="0.5"/>
    <circle cx="34" cy="16" r="5" stroke="#a67749" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- AVRA wordmark -->
  <text x="68" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#304035">AVRA</text>
  <!-- Tagline -->
  <text x="69" y="48" font-family="Georgia, serif" font-size="9" letter-spacing="3.5" fill="#a67749" font-weight="400">STUDIO</text>
  <!-- Separator line -->
  <line x1="68" y1="35" x2="183" y2="35" stroke="#a67749" stroke-width="0.8" opacity="0.4"/>
</svg>
