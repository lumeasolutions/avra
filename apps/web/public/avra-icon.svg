<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">
  <!-- Background -->
  <rect width="56" height="56" rx="14" fill="#304035"/>
  <!-- Body -->
  <ellipse cx="28" cy="36" rx="11" ry="13" fill="#3d5244"/>
  <!-- Head -->
  <ellipse cx="28" cy="21" rx="11" ry="11" fill="#3d5244"/>
  <!-- Ear tufts -->
  <polygon points="19,12 16,5 22,10" fill="#3d5244"/>
  <polygon points="37,12 40,5 34,10" fill="#3d5244"/>
  <!-- Face disc -->
  <ellipse cx="28" cy="21" rx="8.5" ry="8" fill="#304035"/>
  <!-- Left eye -->
  <circle cx="22.5" cy="20" r="4.5" fill="#f5eee8"/>
  <circle cx="22.5" cy="20" r="3" fill="#a67749"/>
  <circle cx="22.5" cy="20" r="1.6" fill="#1a2920"/>
  <circle cx="23.5" cy="19" r="0.7" fill="white"/>
  <!-- Right eye -->
  <circle cx="33.5" cy="20" r="4.5" fill="#f5eee8"/>
  <circle cx="33.5" cy="20" r="3" fill="#a67749"/>
  <circle cx="33.5" cy="20" r="1.6" fill="#1a2920"/>
  <circle cx="34.5" cy="19" r="0.7" fill="white"/>
  <!-- Beak -->
  <polygon points="28,24 25.5,27.5 30.5,27.5" fill="#a67749"/>
  <!-- Wing left -->
  <path d="M17 31 Q11 38 13 48 Q18 44 22 40 Z" fill="#253329"/>
  <!-- Wing right -->
  <path d="M39 31 Q45 38 43 48 Q38 44 34 40 Z" fill="#253329"/>
  <!-- Copper belly highlight -->
  <ellipse cx="28" cy="38" rx="6" ry="8" fill="#a67749" opacity="0.15"/>
  <!-- Eye rings copper -->
  <circle cx="22.5" cy="20" r="4.5" stroke="#a67749" stroke-width="0.8" fill="none" opacity="0.6"/>
  <circle cx="33.5" cy="20" r="4.5" stroke="#a67749" stroke-width="0.8" fill="none" opacity="0.6"/>
</svg>
